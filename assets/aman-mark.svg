<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Aman">
  <title>Aman</title>
  <defs>
    <linearGradient id="amanGlobe" x1="0.08" y1="0.12" x2="0.92" y2="0.9">
      <stop offset="0" stop-color="#5aa0cf"/>
      <stop offset="0.5" stop-color="#3d82b0"/>
      <stop offset="1" stop-color="#27567a"/>
    </linearGradient>
    <linearGradient id="amanBlade" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#eaf4fb"/>
      <stop offset="1" stop-color="#c4e2f4"/>
    </linearGradient>
    <radialGradient id="amanSheen" cx="0.34" cy="0.28" r="0.72">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.36"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="amanClip"><circle cx="100" cy="100" r="68"/></clipPath>
  </defs>

  <!-- orbit halos -->
  <g fill="none" stroke="#cde0ee">
    <circle cx="100" cy="100" r="95" stroke-width="1" opacity="0.45"/>
    <circle cx="100" cy="100" r="86" stroke-width="1" opacity="0.30"/>
  </g>

  <!-- globe -->
  <circle cx="100" cy="100" r="68" fill="url(#amanGlobe)"/>

  <!-- shaded hemisphere + sheen + equator, clipped to globe -->
  <g clip-path="url(#amanClip)">
    <rect x="100" y="32" width="68" height="136" fill="#1f4d70" opacity="0.26"/>
    <circle cx="100" cy="100" r="68" fill="url(#amanSheen)"/>
    <line x1="32" y1="100" x2="168" y2="100" stroke="#cfe6f5" stroke-width="1" opacity="0.22"/>
  </g>

  <!-- vertical spindle / meridian blade -->
  <line x1="100" y1="34" x2="100" y2="166" stroke="#ffffff" stroke-width="1" opacity="0.45"/>
  <path d="M100 32 Q118 74 100 100 Q82 74 100 32 Z" fill="url(#amanBlade)"/>
  <path d="M100 100 Q110 134 100 168 Q90 134 100 100 Z" fill="#c4e2f4" opacity="0.92"/>

  <!-- poles -->
  <circle cx="100" cy="32" r="9" fill="none" stroke="#8fc0e5" stroke-width="1.5" opacity="0.45"/>
  <circle cx="100" cy="32" r="5.5" fill="#8fc0e5"/>
  <circle cx="100" cy="168" r="9" fill="none" stroke="#8fc0e5" stroke-width="1.5" opacity="0.45"/>
  <circle cx="100" cy="168" r="5.5" fill="#8fc0e5"/>

  <!-- hub -->
  <circle cx="100" cy="100" r="14" fill="#16415d"/>
  <circle cx="100" cy="100" r="14" fill="none" stroke="#2f6b93" stroke-width="1.6"/>
  <circle cx="100" cy="100" r="6" fill="#8fc0e5"/>
</svg>
