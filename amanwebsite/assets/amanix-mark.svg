<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Amanix">
  <title>Amanix</title>
  <defs>
    <linearGradient id="amxGlobe" x1="0.08" y1="0.12" x2="0.92" y2="0.9">
      <stop offset="0" stop-color="#5aa0cf"/>
      <stop offset="0.5" stop-color="#3d82b0"/>
      <stop offset="1" stop-color="#27567a"/>
    </linearGradient>
    <linearGradient id="amxBlade" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#eaf4fb"/>
      <stop offset="1" stop-color="#c4e2f4"/>
    </linearGradient>
    <radialGradient id="amxSheen" cx="0.34" cy="0.28" r="0.72">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.36"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="amxClip"><circle cx="100" cy="100" r="54"/></clipPath>
  </defs>

  <!-- faint outer ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#cde0ee" stroke-width="1" opacity="0.4"/>

  <!-- neural network: hexagon edges + spokes to hub -->
  <g stroke="#7fb6dd" fill="none">
    <polygon points="100,20 169.3,60 169.3,140 100,180 30.7,140 30.7,60" stroke-width="1.4" stroke-linejoin="round" opacity="0.5"/>
    <g stroke-width="1" opacity="0.3">
      <line x1="100" y1="100" x2="100" y2="20"/>
      <line x1="100" y1="100" x2="169.3" y2="60"/>
      <line x1="100" y1="100" x2="169.3" y2="140"/>
      <line x1="100" y1="100" x2="100" y2="180"/>
      <line x1="100" y1="100" x2="30.7" y2="140"/>
      <line x1="100" y1="100" x2="30.7" y2="60"/>
    </g>
  </g>

  <!-- globe -->
  <circle cx="100" cy="100" r="54" fill="url(#amxGlobe)"/>
  <g clip-path="url(#amxClip)">
    <rect x="100" y="46" width="54" height="108" fill="#1f4d70" opacity="0.26"/>
    <circle cx="100" cy="100" r="54" fill="url(#amxSheen)"/>
  </g>

  <!-- propeller blade -->
  <path d="M100 52 C118 67 116 92 100 100 C97 84 88 67 100 52 Z" fill="url(#amxBlade)"/>
  <path d="M100 100 Q107 126 100 148 Q95 126 100 100 Z" fill="#c4e2f4" opacity="0.9"/>

  <!-- network nodes -->
  <g>
    <g><circle cx="100" cy="20" r="7" fill="none" stroke="#8fc0e5" stroke-width="1.4" opacity="0.5"/><circle cx="100" cy="20" r="4.5" fill="#7fb6dd"/></g>
    <g><circle cx="169.3" cy="60" r="7" fill="none" stroke="#8fc0e5" stroke-width="1.4" opacity="0.5"/><circle cx="169.3" cy="60" r="4.5" fill="#7fb6dd"/></g>
    <g><circle cx="169.3" cy="140" r="7" fill="none" stroke="#8fc0e5" stroke-width="1.4" opacity="0.5"/><circle cx="169.3" cy="140" r="4.5" fill="#7fb6dd"/></g>
    <g><circle cx="100" cy="180" r="7" fill="none" stroke="#8fc0e5" stroke-width="1.4" opacity="0.5"/><circle cx="100" cy="180" r="4.5" fill="#7fb6dd"/></g>
    <g><circle cx="30.7" cy="140" r="7" fill="none" stroke="#8fc0e5" stroke-width="1.4" opacity="0.5"/><circle cx="30.7" cy="140" r="4.5" fill="#7fb6dd"/></g>
    <g><circle cx="30.7" cy="60" r="7" fill="none" stroke="#8fc0e5" stroke-width="1.4" opacity="0.5"/><circle cx="30.7" cy="60" r="4.5" fill="#7fb6dd"/></g>
  </g>

  <!-- hub -->
  <circle cx="100" cy="100" r="12" fill="#16415d"/>
  <circle cx="100" cy="100" r="12" fill="none" stroke="#2f6b93" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="5" fill="#8fc0e5"/>
</svg>
