<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Aman">
  <title>Aman</title>
  <!-- orbit halos -->
  <g fill="none" stroke="#ffffff">
    <circle cx="100" cy="100" r="94" stroke-width="1.4" opacity="0.35"/>
    <circle cx="100" cy="100" r="84" stroke-width="1.4" opacity="0.22"/>
  </g>
  <!-- globe disc -->
  <circle cx="100" cy="100" r="66" fill="#ffffff" opacity="0.16"/>
  <circle cx="100" cy="100" r="66" fill="none" stroke="#ffffff" stroke-width="2.2" opacity="0.6"/>
  <line x1="36" y1="100" x2="164" y2="100" stroke="#ffffff" stroke-width="1.4" opacity="0.3"/>
  <!-- spindle blade -->
  <line x1="100" y1="36" x2="100" y2="164" stroke="#ffffff" stroke-width="1.4" opacity="0.4"/>
  <path d="M100 34 Q118 74 100 100 Q82 74 100 34 Z" fill="#ffffff"/>
  <path d="M100 100 Q110 134 100 166 Q90 134 100 100 Z" fill="#ffffff" opacity="0.8"/>
  <!-- poles -->
  <circle cx="100" cy="34" r="6" fill="#ffffff"/>
  <circle cx="100" cy="166" r="6" fill="#ffffff"/>
  <!-- hub -->
  <circle cx="100" cy="100" r="14" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="100" cy="100" r="6" fill="#ffffff"/>
</svg>
